<div class="app">

  <header>
    <div class="title">
      🧸 SISTEMA DE ESTOQUE - MOLLIBEAR 🐻
    </div>

    <div class="actions">
      <button id="produtosCadastradosBtn" class="button-fofo">📋 Produtos Cadastrados</button>
      <button class="button-fofo">❓ Sobre</button>
    </div>
  </header>

  <div class="content">

    <aside>

      <div class="card">
        <h2>📦 CADASTRO DE PRODUTO</h2>

        <label>Código do Produto</label>
        <input type="text" id="codigoProduto" class="input-fofo">

        <label>Descrição</label>
        <input type="text" id="descricaoProduto" class="input-fofo">

        <label>Quantidade</label>
        <input type="number" id="quantidadeProduto" class="input-fofo">

        <div class="row">
          <div>
            <label>Estante</label>
            <select id="estanteSelect" class="input-fofo"></select>
          </div>

          <div>
            <label>Nível</label>
            <select id="nivelSelect" class="input-fofo">
              <option>A</option>
              <option>B</option>
              <option>C</option>
              <option>D</option>
              <option>E</option>
            </select>
          </div>
        </div>

        <button class="save button-fofo" id="salvarProdutoBtn">
          💾 Salvar Produto
        </button>
        <p id="erroCadastro" style="color: #d35f5f; margin-top: 8px; font-size: 14px;"></p>
      </div>

      <div class="card">
        <h2>🔍 BUSCAR PRODUTO</h2>

        <input type="text" id="buscaProduto" class="input-fofo">

        <button class="save button-fofo" id="localizarProdutoBtn">
          🔎 Localizar
        </button>

        <div class="result" id="resultadoBusca"></div>
      </div>

    </aside>

    <main>

      <h2>🗺️ MAPA DA SALA G</h2>

      <svg id="mapa" viewBox="0 0 1250 800" class="mapa"></svg>

      <div class="rodape">
        💡 Clique em uma estante para ver os produtos cadastrados! 🐻
      </div>

      <div id="produtosCadastradosModal" class="modal" style="display: none;">
        <div class="modal-content">
          <span class="close">&times;</span>
          <h2>📋 Produtos Cadastrados</h2>
          <div id="listaProdutosCadastrados"></div>
        </div>
      </div>

    </main>

  </div>

</div>

// Função para carregar os produtos salvos no localStorage
function carregarProdutos() {
  const produtos = JSON.parse(localStorage.getItem('produtos')) || [];
  return produtos;
}

// Função para salvar os produtos no localStorage
function salvarProdutos(produtos) {
  localStorage.setItem('produtos', JSON.stringify(produtos));
}

// Função para preencher o select de estantes
function preencherSelectEstantes() {
  const estanteSelect = document.getElementById('estanteSelect');
  estantes.forEach(estante => {
    const option = document.createElement('option');
    option.value = estante.n;
    option.textContent = `Estante ${estante.n}`;
    estanteSelect.appendChild(option);
  });
}

// Função para exibir os produtos de uma estante
function exibirProdutosEstante(estanteNumero) {
  const produtos = carregarProdutos();
  const produtosEstante = produtos.filter(produto => produto.estante == estanteNumero);
  
  if (produtosEstante.length === 0) {
    alert(`🐻 Estante ${estanteNumero} não possui produtos cadastrados!`);
  } else {
    let mensagem = `📦 Produtos na Estante ${estanteNumero}:\n\n`;
    produtosEstante.forEach(produto => {
      mensagem += `Código: ${produto.codigo}\nDescrição: ${produto.descricao}\nQuantidade: ${produto.quantidade}\nNível: ${produto.nivel}\n\n`;
    });
    alert(mensagem);
  }
}

// Função para exibir todos os produtos cadastrados
function exibirProdutosCadastrados() {
  const produtos = carregarProdutos();
  const listaProdutos = document.getElementById('listaProdutosCadastrados');
  const modal = document.getElementById('produtosCadastradosModal');
  
  listaProdutos.innerHTML = '';
  
  if (produtos.length === 0) {
    listaProdutos.innerHTML = '<p style="text-align: center; color: #d35f5f;">🐻 Nenhum produto cadastrado ainda!</p>';
  } else {
    const ul = document.createElement('ul');
    ul.style.listStyle = 'none';
    ul.style.padding = '0';
    
    produtos.forEach((produto, index) => {
      const li = document.createElement('li');
      li.style.marginBottom = '15px';
      li.style.padding = '12px';
      li.style.border = '2px solid #f5e6d3';
      li.style.borderRadius = '8px';
      li.style.backgroundColor = '#fffaf0';
      li.style.display = 'flex';
      li.style.justifyContent = 'space-between';
      li.style.alignItems = 'center';
      
      const infoProduto = document.createElement('div');
      infoProduto.style.flex = '1';
      infoProduto.innerHTML = `
        <strong>📌 Código:</strong> ${produto.codigo}<br>
        <strong>📝 Descrição:</strong> ${produto.descricao}<br>
        <strong>📦 Estante:</strong> ${produto.estante}, <strong>Nível:</strong> ${produto.nivel}<br>
        <strong>📊 Quantidade:</strong> <input type="number" id="quantidade-${index}" value="${produto.quantidade}" style="width: 60px; padding: 4px; border: 1px solid #f5e6d3; border-radius: 4px; text-align: center;">
      `;
      
      const divBotoes = document.createElement('div');
      divBotoes.style.display = 'flex';
      divBotoes.style.gap = '8px';
      
      const botaoAtualizar = document.createElement('button');
      botaoAtualizar.textContent = '🔄 Atualizar';
      botaoAtualizar.style.padding = '6px 12px';
      botaoAtualizar.style.backgroundColor = '#f5e6d3';
      botaoAtualizar.style.color = '#8b4513';
      botaoAtualizar.style.border = 'none';
      botaoAtualizar.style.borderRadius = '4px';
      botaoAtualizar.style.cursor = 'pointer';
      botaoAtualizar.onclick = () => {
        const novaQuantidade = document.getElementById(`quantidade-${index}`).value;
        if (novaQuantidade && !isNaN(novaQuantidade)) {
          produtos[index].quantidade = novaQuantidade;
          salvarProdutos(produtos);
          alert('✅ Quantidade atualizada com sucesso!');
        } else {
          alert('❌ Insira uma quantidade válida!');
        }
      };
      
      const botaoRemover = document.createElement('button');
      botaoRemover.textContent = '🗑️ Remover';
      botaoRemover.style.padding = '6px 12px';
      botaoRemover.style.backgroundColor = '#f8c8c8';
      botaoRemover.style.color = '#8b0000';
      botaoRemover.style.border = 'none';
      botaoRemover.style.borderRadius = '4px';
      botaoRemover.style.cursor = 'pointer';
      botaoRemover.onclick = () => {
        if (confirm('🐻 Tem certeza que deseja remover este produto?')) {
          removerProduto(index);
        }
      };
      
      divBotoes.appendChild(botaoAtualizar);
      divBotoes.appendChild(botaoRemover);
      
      li.appendChild(infoProduto);
      li.appendChild(divBotoes);
      ul.appendChild(li);
    });
    
    listaProdutos.appendChild(ul);
  }
  
  modal.style.display = 'block';
}

// Função para remover um produto
function removerProduto(index) {
  const produtos = carregarProdutos();
  produtos.splice(index, 1);
  salvarProdutos(produtos);
  exibirProdutosCadastrados();
  alert('🗑️ Produto removido com sucesso!');
}

// Função para fechar o modal
function fecharModal() {
  document.getElementById('produtosCadastradosModal').style.display = 'none';
}

// Função para salvar um novo produto
function salvarProduto() {
  const codigo = document.getElementById('codigoProduto').value.trim();
  const descricao = document.getElementById('descricaoProduto').value.trim();
  const quantidade = document.getElementById('quantidadeProduto').value.trim();
  const estante = document.getElementById('estanteSelect').value;
  const nivel = document.getElementById('nivelSelect').value;
  const erroCadastro = document.getElementById('erroCadastro');
  
  // Validações
  if (!codigo || !descricao || !quantidade || !estante || !nivel) {
    erroCadastro.textContent = '❌ Preencha todos os campos!';
    return;
  }
  
  const produtos = carregarProdutos();
  const codigoJaExiste = produtos.some(produto => produto.codigo === codigo);
  
  if (codigoJaExiste) {
    erroCadastro.textContent = '❌ Código de produto já cadastrado!';
    return;
  }
  
  const novoProduto = { codigo, descricao, quantidade, estante, nivel };
  produtos.push(novoProduto);
  salvarProdutos(produtos);
  
  alert('💾 Produto salvo com sucesso!');
  erroCadastro.textContent = '';
  
  // Limpar campos
  document.getElementById('codigoProduto').value = '';
  document.getElementById('descricaoProduto').value = '';
  document.getElementById('quantidadeProduto').value = '';
}

// Função para buscar um produto
function buscarProduto() {
  const busca = document.getElementById('buscaProduto').value.toLowerCase();
  const produtos = carregarProdutos();
  const resultadoBusca = document.getElementById('resultadoBusca');
  
  const produtosEncontrados = produtos.filter(produto => 
    produto.codigo.toLowerCase().includes(busca) || 
    produto.descricao.toLowerCase().includes(busca) || 
    produto.estante.toString().includes(busca)
  );
  
  if (produtosEncontrados.length === 0) {
    resultadoBusca.innerHTML = '<p style="text-align: center; color: #d35f5f;">🐻 Nenhum produto encontrado!</p>';
  } else {
    resultadoBusca.innerHTML = '<ul style="list-style: none; padding: 0;">';
    produtosEncontrados.forEach(produto => {
      resultadoBusca.innerHTML += `
        <li style="margin-bottom: 10px; padding: 10px; border: 2px solid #f5e6d3; border-radius: 8px; background: #fffaf0;">
          <strong>📌 Código:</strong> ${produto.codigo}<br>
          <strong>📝 Descrição:</strong> ${produto.descricao}<br>
          <strong>📦 Estante:</strong> ${produto.estante}, <strong>Nível:</strong> ${produto.nivel}<br>
          <strong>📊 Quantidade:</strong> ${produto.quantidade}
        </li>
      `;
    });
    resultadoBusca.innerHTML += '</ul>';
  }
}

// Inicializar o SVG e os eventos
const svg = document.querySelector(".mapa");
const NS = "http://www.w3.org/2000/svg";

estantes.forEach(estante => {
  const rect = document.createElementNS(NS, "rect");
  rect.setAttribute("x", estante.x);
  rect.setAttribute("y", estante.y);
  rect.setAttribute("width", estante.w);
  rect.setAttribute("height", estante.h);
  rect.setAttribute("rx", 5);
  rect.setAttribute("fill", estante.c);
  rect.setAttribute("class", "estante");
  rect.setAttribute("stroke", "#8b4513");
  rect.setAttribute("stroke-width", "1");
  
  rect.addEventListener("click", () => {
    exibirProdutosEstante(estante.n);
  });
  
  svg.appendChild(rect);
  
  const texto = document.createElementNS(NS, "text");
  texto.setAttribute("x", estante.x + estante.w / 2);
  texto.setAttribute("y", estante.y + estante.h / 2);
  texto.setAttribute("class", "numero");
  texto.setAttribute("text-anchor", "middle");
  texto.setAttribute("dominant-baseline", "middle");
  texto.setAttribute("fill", "#8b4513");
  texto.setAttribute("font-size", "14");
  texto.setAttribute("font-weight", "bold");
  texto.textContent = estante.n;
  
  svg.appendChild(texto);
});

// Adicionar eventos aos botões
document.getElementById('salvarProdutoBtn').addEventListener('click', salvarProduto);
document.getElementById('localizarProdutoBtn').addEventListener('click', buscarProduto);
document.getElementById('produtosCadastradosBtn').addEventListener('click', exibirProdutosCadastrados);
document.querySelector('.close').addEventListener('click', fecharModal);

// Inicializar o select de estantes
preencherSelectEstantes();
</script>
