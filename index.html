  <!-- Firebase SDK v10 -->
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyD3j7NdARKWfcyQcaG5dX6VAghuTfCMX68",
      authDomain: "mollibear-estoque.firebaseapp.com",
      projectId: "mollibear-estoque",
      storageBucket: "mollibear-estoque.firebasestorage.app",
      messagingSenderId: "168767505828",
      appId: "1:168767505828:web:50410e7841162296572d31",
      measurementId: "G-QM20K794M8"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Função para carregar os produtos do Firestore
    async function carregarProdutos() {
      try {
        const docRef = doc(db, "estoque", "produtos");
        const docSnap = await getDoc(docRef);
        return docSnap.exists() ? docSnap.data().produtos || [] : [];
      } catch (error) {
        console.error("Erro ao carregar produtos:", error);
        return [];
      }
    }

    // Função para salvar os produtos no Firestore
    async function salvarProdutos(produtos) {
      try {
        await setDoc(doc(db, "estoque", "produtos"), { produtos });
      } catch (error) {
        console.error("Erro ao salvar produtos:", error);
      }
    }

    // Tornar as funções globais para serem usadas no script principal
    window.carregarProdutos = carregarProdutos;
    window.salvarProdutos = salvarProdutos;
  </script>
</head>

// Função para preencher o select de estantes
function preencherSelectEstantes() {
  const estanteSelect = document.getElementById('estanteSelect');
  estantes.forEach(estante => {
    const option = document.createElement('option');
    option.value = estante.n;
    option.textContent = `Estante ${estante.n}`;
    estanteSelect.appendChild(option);
  });
}

// Função para verificar se o nível da estante já tem um produto
async function verificarNivelOcupado(estante, nivel) {
  const produtos = await window.carregarProdutos();
  return produtos.some(produto => produto.estante == estante && produto.nivel === nivel);
}

      li.style.justifyContent = 'space-between';

      li.style.flexDirection = 'column';
      
      const infoProduto = document.createElement('div');

      divBotoes.style.marginTop = '10px';

      botaoAtualizar.style.color = '#8b4513';

      botaoAtualizar.style.borderRadius = '4px';

      botaoAtualizar.style.fontSize = '16px';

// Função para exibir todos os produtos cadastrados

  await filtrarProdutosModal();
}

// Função para remover um produto
async function removerProduto(codigo, cor, modelo) {
  const produtos = await window.carregarProdutos();
  const index = produtos.findIndex(produto => produto.codigo === codigo && produto.cor === cor && produto.modelo === modelo);
  if (index !== -1) {
    produtos.splice(index, 1);
    await window.salvarProdutos(produtos);
    await filtrarProdutosModal();
    alert('🗑️ Produto removido com sucesso!');
  }
}

function fecharModal() {
  document.getElementById('produtosCadastradosModal').style.display = 'none';
}

// Função para salvar um novo produto
async function salvarProduto() {
  const codigo = document.getElementById('codigoProduto').value.trim();
  const descricao = document.getElementById('descricaoProduto').value.trim();
  const cor = document.getElementById('corProduto').value.trim();
  const modelo = document.getElementById('modeloProduto').value.trim();
  const quantidade = document.getElementById('quantidadeProduto').value.trim();
  const estante = document.getElementById('estanteSelect').value;
  const nivel = document.getElementById('nivelSelect').value;
  const erroCadastro = document.getElementById('erroCadastro');
  
  // Validações
  if (!codigo || !descricao || !cor || !modelo || !quantidade || !estante || !nivel) {
    erroCadastro.textContent = '❌ Preencha todos os campos!';
    return;
  }
  
  const produtos = await window.carregarProdutos();
  // Verifica se já existe um produto com o mesmo código, cor e modelo
  const produtoJaExiste = produtos.some(produto => 
    produto.codigo === codigo && 
    produto.cor === cor && 
    produto.modelo === modelo
  );
  
  if (produtoJaExiste) {
    erroCadastro.textContent = '❌ Este produto (código + cor + modelo) já está cadastrado!';
    return;
  }
  
  // Verifica se o nível da estante já está ocupado
  const nivelOcupado = await verificarNivelOcupado(estante, nivel);
  if (nivelOcupado) {
    const confirmar = confirm(`⚠️ Já existe um produto cadastrado no nível ${nivel} da estante ${estante}. Deseja cadastrar mesmo assim?`);
    if (!confirmar) {
      return;
    }
  }
  
  const novoProduto = { codigo, descricao, cor, modelo, quantidade, estante, nivel };
  produtos.push(novoProduto);
  await window.salvarProdutos(produtos);
  
  alert('💾 Produto salvo com sucesso!');
  erroCadastro.textContent = '';
  
  // Limpar campos
  document.getElementById('codigoProduto').value = '';
  document.getElementById('descricaoProduto').value = '';
  document.getElementById('corProduto').value = '';
  document.getElementById('modeloProduto').value = '';
  document.getElementById('quantidadeProduto').value = '';
}

// Função para buscar um produto

    produto.cor.toLowerCase().includes(busca) ||
    produto.modelo.toLowerCase().includes(busca) ||
    produto.estante.toString().includes(busca)
  );
  
  if (produtosEncontrados.length === 0) {
    resultadoBusca.innerHTML = '<p style="text-align: center; color: #d35f5f; font-size: 16px;">🐻 Nenhum produto encontrado!</p>';
  } else {
    resultadoBusca.innerHTML = '<ul style="list-style: none; padding: 0;">';
    produtosEncontrados.forEach(produto => {
      resultadoBusca.innerHTML += `
        <li style="margin-bottom: 10px; padding: 10px; border: 2px solid #f5e6d3; border-radius: 8px; background: #fffaf0; font-size: 16px;">
          <p style="margin: 5px 0;"><strong>📌 Código:</strong> ${produto.codigo}</p>
          <p style="margin: 5px 0;"><strong>📝 Descrição:</strong> ${produto.descricao}</p>
          <p style="margin: 5px 0;"><strong>🎨 Cor:</strong> ${produto.cor}</p>
          <p style="margin: 5px 0;"><strong>📐 Modelo:</strong> ${produto.modelo}</p>
          <p style="margin: 5px 0;"><strong>📦 Estante:</strong> ${produto.estante}, <strong>Nível:</strong> ${produto.nivel}</p>
          <p style="margin: 5px 0;"><strong>📊 Quantidade:</strong> ${produto.quantidade}</p>
        </li>
      `;
    });
    resultadoBusca.innerHTML += '</ul>';
  }
}

// Inicializar o SVG e os eventos
const svg = document.querySelector(".mapa");
const NS = "http://www.w3.org/2000/svg";

// Adicionar retângulo para indicar a porta
const porta = document.createElementNS(NS, "rect");
porta.setAttribute("x", 10);
porta.setAttribute("y", 700);
porta.setAttribute("width", 30);
porta.setAttribute("height", 60);
porta.setAttribute("fill", "#8b4513");
porta.setAttribute("stroke", "#000");
porta.setAttribute("stroke-width", "2");
svg.appendChild(porta);

// Adicionar texto "PORTAS" ao lado da porta
const textoPorta = document.createElementNS(NS, "text");
textoPorta.setAttribute("x", 25);
textoPorta.setAttribute("y", 730);
textoPorta.setAttribute("text-anchor", "middle");
textoPorta.setAttribute("fill", "#fff");
textoPorta.setAttribute("font-size", "12");
textoPorta.setAttribute("font-weight", "bold");
textoPorta.setAttribute("transform", "rotate(-90, 25, 730)");
textoPorta.textContent = "PORTAS";
svg.appendChild(textoPorta);

// Adicionar estantes ao SVG
estantes.forEach(estante => {
  const rect = document.createElementNS(NS, "rect");
  rect.setAttribute("x", estante.x);
  rect.setAttribute("y", estante.y);
  rect.setAttribute("width", estante.w);
  rect.setAttribute("height", estante.h);
  rect.setAttribute("rx", 5);
  rect.setAttribute("fill", estante.c);
  rect.setAttribute("class", "estante");
  rect.setAttribute("stroke", "#8b4513");
  rect.setAttribute("stroke-width", "1");
  
  rect.addEventListener("click", () => {
    exibirProdutosEstante(estante.n);
  });
  
  svg.appendChild(rect);
  
  const texto = document.createElementNS(NS, "text");
  texto.setAttribute("x", estante.x + estante.w / 2);
  texto.setAttribute("y", estante.y + estante.h / 2);
  texto.setAttribute("class", "numero");
  texto.setAttribute("text-anchor", "middle");
  texto.setAttribute("dominant-baseline", "middle");
  texto.setAttribute("fill", "#8b4513");
  texto.setAttribute("font-size", "16");
  texto.setAttribute("font-weight", "bold");
  texto.textContent = estante.n;
  
  svg.appendChild(texto);
});

// Adicionar eventos aos botões
document.getElementById('salvarProdutoBtn').addEventListener('click', salvarProduto);
document.getElementById('localizarProdutoBtn').addEventListener('click', buscarProduto);
document.getElementById('produtosCadastradosBtn').addEventListener('click', exibirProdutosCadastrados);
document.querySelector('.close').addEventListener('click', fecharModal);
document.getElementById('buscarNoModalBtn').addEventListener('click', filtrarProdutosModal);
document.querySelector('.close-estante').addEventListener('click', fecharModalEstante);

// Inicializar o select de estantes
preencherSelectEstantes();
</script>

<style>
  :root {
    --bege-claro: #f5e6d3;
    --bege-escuro: #8b4513;
    --bege-fundo: #fffaf0;
    --rosa-suave: #f8c8c8;
    --azul-suave: #d4e6f1;
    --roxo-suave: #e6d4f1;
  }

  body {
    margin: 0;
    padding: 0;
    background-color: var(--bege-fundo);
    font-family: 'Comic Sans MS', cursive, sans-serif;
    font-size: 16px;
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 10px;
  }

  header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
    text-align: center;
  }

  .title {
    font-size: 24px;
    font-weight: bold;
    color: var(--bege-escuro);
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    margin-bottom: 10px;
  }

  .actions {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
  }

  .actions button {
    margin: 5px;
    cursor: pointer;
  }

  .button-fofo {
    padding: 12px 20px;
    background-color: var(--bege-claro);
    color: var(--bege-escuro);
    border: 2px solid var(--bege-escuro);
    border-radius: 20px;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    font-weight: bold;
    font-size: 16px;
    transition: all 0.3s;
  }

  .button-fofo:hover {
    background-color: var(--bege-escuro);
    color: var(--bege-fundo);
    transform: scale(1.05);
  }

  .content {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  aside {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  main {
    width: 100%;
  }

  .card {
    background: var(--bege-fundo);
    border: 2px solid var(--bege-claro);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }

  .card h2 {
    margin-top: 0;
    font-size: 20px;
    color: var(--bege-escuro);
    border-bottom: 2px solid var(--bege-claro);
    padding-bottom: 10px;
  }

  .card label {
    display: block;
    margin-top: 12px;
    font-weight: bold;
    color: var(--bege-escuro);
    font-size: 16px;
  }

  .input-fofo {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border: 2px solid var(--bege-claro);
    border-radius: 8px;
    background-color: #fff;
    font-family: 'Comic Sans MS', cursive, sans-serif;
    font-size: 16px;
  }

  .input-fofo:focus {
    border-color: var(--bege-escuro);
    outline: none;
  }

  .row {
    display: flex;
    gap: 10px;
  }

  .row div {
    flex: 1;
  }

  .save {
    margin-top: 20px;
    width: 100%;
    font-size: 16px;
  }

  .mapa-container {
    width: 100%;
    overflow-x: auto;
    border: 2px solid var(--bege-claro);
    border-radius: 12px;
    background-color: var(--bege-fundo);
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  }

  .mapa {
    width: 100%;
    height: auto;
    min-width: 800px;
    display: block;
  }

  .rodape {
    margin-top: 15px;
    font-style: italic;
    color: var(--bege-escuro);
    text-align: center;
    font-size: 18px;
  }

  .result {
    margin-top: 16px;
    padding: 12px;
    border: 2px solid var(--bege-claro);
    border-radius: 8px;
    background: var(--bege-fundo);
    font-size: 16px;
  }

  .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: var(--bege-fundo);
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 700px;
    max-height: 80%;
    overflow: auto;
    border: 2px solid var(--bege-claro);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
  }

  .modal-content h2 {
    color: var(--bege-escuro);
    margin-top: 0;
    text-align: center;
    font-size: 22px;
  }

  .close, .close-estante {
    float: right;
    font-size: 28px;
    cursor: pointer;
    color: var(--bege-escuro);
  }

  .close:hover, .close-estante:hover {
    color: #ff6b6b;
  }

  .estante {
    cursor: pointer;
    transition: all 0.2s;
  }

  .estante:hover {
    opacity: 0.8;
    stroke-width: 2;
  }

  .numero {
    font-size: 16px;
    font-weight: bold;
  }

  /* Media Queries para responsividade */
  @media (min-width: 768px) {
    .content {
      flex-direction: row;
    }
    
    aside {
      width: 300px;
    }
    
    main {
      flex: 1;
    }
    
    header {
      flex-direction: row;
      justify-content: space-between;
    }
    
    .title {
      font-size: 28px;
      text-align: left;
    }
    
    .actions {
      justify-content: flex-end;
    }
    
    .mapa-container {
      min-width: auto;
    }
    
    .mapa {
      min-width: auto;
    }
  }
</style>

</body>
</html>
